name: Auto Publish Blog

on:
  schedule:
    - cron: '0 0 * * *'   # 오전 9시 KST (UTC 00:00) — 하루 1회
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          BLOG_MAIN_ID: ${{ secrets.BLOG_MAIN_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LINK_MEDICARE: ${{ secrets.LINK_MEDICARE }}
          LINK_RETIREMENT: ${{ secrets.LINK_RETIREMENT }}
          LINK_AGING: ${{ secrets.LINK_AGING }}
          LINK_HEALTH: ${{ secrets.LINK_HEALTH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          printf 'GOOGLE_CLIENT_ID=%s\n' $GOOGLE_CLIENT_ID >> .env
          printf 'GOOGLE_CLIENT_SECRET=%s\n' $GOOGLE_CLIENT_SECRET >> .env
          printf 'GOOGLE_REFRESH_TOKEN=%s\n' $GOOGLE_REFRESH_TOKEN >> .env
          printf 'BLOG_MAIN_ID=%s\n' $BLOG_MAIN_ID >> .env
          printf 'GEMINI_API_KEY=%s\n' $GEMINI_API_KEY >> .env
          printf 'ANTHROPIC_API_KEY=%s\n' $ANTHROPIC_API_KEY >> .env
          printf 'UNSPLASH_ACCESS_KEY=%s\n' $UNSPLASH_ACCESS_KEY >> .env
          printf 'PEXELS_API_KEY=%s\n' $PEXELS_API_KEY >> .env
          printf 'TAVILY_API_KEY=%s\n' $TAVILY_API_KEY >> .env
          printf 'LINK_MEDICARE=%s\n' $LINK_MEDICARE >> .env
          printf 'LINK_RETIREMENT=%s\n' $LINK_RETIREMENT >> .env
          printf 'LINK_AGING=%s\n' $LINK_AGING >> .env
          printf 'LINK_HEALTH=%s\n' $LINK_HEALTH >> .env
          printf 'TELEGRAM_BOT_TOKEN=%s\n' $TELEGRAM_BOT_TOKEN >> .env
          printf 'TELEGRAM_CHAT_ID=%s\n' $TELEGRAM_CHAT_ID >> .env

      - name: Run auto publish
        run: python auto_publish.py

      - name: Commit publish state
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -f data/published_titles.json data/published/ data/keyword_history.json data/hook_history.json
          git diff --staged --quiet || git commit -m "chore: update publish state [skip ci]"
          git pull --rebase origin main
          git push